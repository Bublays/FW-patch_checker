name: Firmware & patch check

on:
  schedule:
    # kazde pondeli v 6:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "config/**"
      - ".github/workflows/check-firmware.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrapers
        working-directory: scripts
        run: python run_all.py

      - name: Build static site
        working-directory: scripts
        run: python build_site.py

      - name: Commit updated data
        run: |
          git config user.name "fw-checker-bot"
          git config user.email "bublays@google.com"

          # data/latest.json a data/history.json jsou pokazde kompletne
          # znovu vygenerovane timto behem - nema smysl je "mergovat" po
          # radcich s tim, co mezitim pripadne pushnul jiny bezici/predchozi
          # beh. Misto rebase/merge proto vezmeme nejnovejsi stav vetve
          # z GitHubu a na nej jen znovu polozime nasi cerstvou verzi souboru.
          git add data/latest.json data/history.json
          if git diff --cached --quiet; then
            echo "Zadna zmena v datech, nic se necommituje."
            exit 0
          fi
          git commit -m "chore: update firmware/patch data ($(date -u +%Y-%m-%d))"

          git fetch origin main
          git reset --soft origin/main
          git add data/latest.json data/history.json
          git commit -m "chore: update firmware/patch data ($(date -u +%Y-%m-%d))"
          git push origin HEAD:main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
