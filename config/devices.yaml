# Seznam sledovaných zařízení.
# Uprav podle potřeby - přidání/odebrání modelu nebo generace stačí, kód
# nemusíš měnit.

hpe:
  # Generace, které nás zajímají u každé z rodin níže.
  generations: ["Gen10", "Gen10 Plus", "Gen11", "Gen12"]
  families:
    - DL320
    - DL360
    - DL365
    - DL380
    - DL385

ibm:
  # FlashSystem produkty - firmware = úroveň IBM Storage Virtualize.
  flashsystem:
    - id: FS7300
      display_name: "IBM FlashSystem 7300"
      support_info_page: "https://www.ibm.com/support/pages/support-information-flashsystem-7000-family"
    - id: FS5300
      display_name: "IBM FlashSystem 5300"
      support_info_page: "https://www.ibm.com/support/pages/support-information-flashsystem-5000-family"
    - id: FS5200
      display_name: "IBM FlashSystem 5200"
      support_info_page: "https://www.ibm.com/support/pages/support-information-flashsystem-5000-family"

  # Tape knihovny s plnou historii firmware (primy .txt soubor + zaloha na
  # verejnou fix-readme stranku, kdyby primy odkaz prestal fungovat).
  tape_fixlist:
    - id: TS4300
      display_name: "IBM TS4300 Tape Library"
      fixlist_txt_url: "https://delivery04.dhe.ibm.com/sar/CMA/STA/09qng/0/TS4300_fixlist.txt"
      fix_readme_page: "https://www.ibm.com/support/pages/ts4300-fix-readme"

  # Tape knihovny bez samostatne historie - misto toho tabulka "Code Update
  # Recommendation" (Minimum / Recommended / Latest Level).
  tape_recommendation:
    - id: Diamondback
      display_name: "IBM Diamondback Tape Library"
      recommendation_page: "https://www.ibm.com/support/pages/ibm-diamondback-code-update-recommendation"

dell:
  models:
    - "PowerEdge R440"
    - "PowerEdge R740"
    - "PowerEdge T140"
